name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Round-trip tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-editor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: tauri-editor/package-lock.json

      - run: npm ci

      # Round-trip fidelity tests (jsdom). These don't need the Rust toolchain —
      # they exercise the TipTap + tiptap-markdown layer only.
      - run: npm test
